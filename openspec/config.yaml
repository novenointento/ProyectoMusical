schema: spec-driven

context: |
  Proyecto Musical - aplicacion de estudio de lenguaje musical para
  estudiantes de conservatorio elemental.
  Stack: Next.js 15 (App Router) + TypeScript + Prisma + PostgreSQL (Neon).
  Auth.js v5 con Credentials provider.
  Motor musical: Tonal.js (logica pura), Tone.js (audio), VexFlow (pentagrama).
  Contenido en MDX bajo /content, metadata en BD.
  Todos los cambios se capturan primero como artefactos OpenSpec.

rules:
  _global:
    - Leer README.md y ai-specs/specs/base-standards.mdc antes de crear artefactos.
    - Cada change debe ser pequeno, concreto y verificable.
    - Validar entradas en server actions/API con Zod.
    - Preservar el contrato ExerciseDefinition al anadir tipos nuevos.
  tasks:
    - Tareas de menos de 2h.
    - Todo change termina con verificacion y actualizacion de documentacion.
